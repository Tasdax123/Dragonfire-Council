<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg:#0e1420; --panel:#161e2c; --panel2:#131a26; --line:#2a3548; --gold:#d9a441;
 --text:#e8e2d4; --dim:#8a93a5; --good:#6fae6f; --warn:#d9a441; --bad:#c46f6f;
 --leg:#d9a441; --epi:#9d6bc4; --rare:#4a90c4;
 --warrior:#c1502e; --hunter:#c9962b; --sentinel:#b8923f; --champion:#9d7bb0;
}
html,body{background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;-webkit-font-smoothing:antialiased}
body{max-width:980px;margin:0 auto;padding:16px 14px 80px}
h1,h2,h3,.cz{font-family:'Cinzel',serif}
a{color:var(--gold)}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
button{font-family:inherit;cursor:pointer;color:var(--text);background:transparent;border:none}
.header{text-align:center;padding:8px 0 14px}
.kicker{font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;color:var(--gold);opacity:.8;text-transform:uppercase}
.title{font-size:30px;font-weight:700;color:var(--gold);let-spacing:1px;margin-top:2px}
.subtitle{color:var(--dim);font-size:14px;margin-top:4px}
.tabs{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.tab{padding:8px 16px;border:1px solid var(--line);border-radius:8px;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--dim);background:var(--panel2)}
.tab.on{color:#1a1206;background:var(--gold);border-color:var(--gold);font-weight:700}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
.muted{color:var(--dim)}
.small{font-size:12px}
.btn{background:var(--gold);color:#1a1206;font-family:'Cinzel',serif;font-weight:700;border-radius:8px;padding:11px 20px;font-size:15px;letter-spacing:.5px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--dim);font-weight:400}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{font-size:10px;padding:2px 7px;border-radius:20px;border:1px solid var(--line)}
.note{border-radius:8px;padding:9px 11px;margin-top:8px;font-size:14px;line-height:1.4;border-left:3px solid var(--line);background:var(--panel2)}
.note.good{border-left-color:var(--good)} .note.warn{border-left-color:var(--warn)} .note.info{border-left-color:var(--rare)} .note.bad{border-left-color:var(--bad)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:8px}
.dcard{background:var(--panel2);border:1.5px solid var(--line);border-radius:8px;padding:8px;text-align:left;position:relative;transition:border-color .15s}
.dcard:hover{border-color:var(--gold)}
.dcard .nm{font-family:'Cinzel',serif;font-weight:600;font-size:13px;line-height:1.1}
.dcard .mt{font-size:10px;color:var(--dim);margin-top:2px}
.dcard .st{margin-top:5px;font-size:13px;letter-spacing:1px;min-height:16px}
.dcard.owned{border-color:var(--gold)}
.formation{display:flex;gap:10px;justify-content:center;align-items:stretch;flex-wrap:wrap;margin:6px 0}
.slot{flex:1 1 150px;min-width:130px;max-width:220px}
.slotlbl{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;text-align:center;margin-bottom:4px}
.slotcard{border:1.5px solid var(--line);border-radius:8px;padding:10px;min-height:96px;display:flex;flex-direction:column;justify-content:center;text-align:center}
.wrbar{height:10px;border-radius:6px;background:var(--panel2);overflow:hidden;border:1px solid var(--line)}
.wrfill{height:100%;background:linear-gradient(90deg,var(--good),#9cd29c)}
select,input{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:5px;padding:3px 6px;font-family:inherit;font-size:13px}
.modal{position:fixed;inset:0;background:rgba(6,9,14,.88);display:flex;align-items:center;justify-content:center;padding:14px;z-index:50}
.modalbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;max-width:620px;width:100%;max-height:84vh;display:flex;flex-direction:column}
.foot{text-align:center;color:var(--dim);font-size:11px;line-height:1.6;margin-top:20px;opacity:.7}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--panel2);border:1px solid var(--line);color:var(--dim);margin-left:5px}
.big{font-size:30px;font-weight:700;font-family:'Cinzel',serif}
</style>
</head>

function statMult(rarity, star, growth){
  const sb=(SB[rarity]||SB.Rare)[star]||0;

}
function primaryType(name){

}

function makeUnit(d, lane, side, star, growth, troops, match, research){
  const sm=statMult(d.rarity, star, growth);
  return {
    name:d.name, breed:d.breed, rarity:d.rarity, lane, side, star, growth,
    aff:d.aff||[], research:research||{}, match: match?CFG.match:0,
    bStr:d.str*sm, bInt:d.int*sm, bInst:d.inst*sm, bInit:d.init*sm,
    troops, max:troops, alive:true, dmgType:primaryType(d.name),

    drAll:1, drT:{phys:1,tac:1,fire:1}, amp:{phys:1,tac:1,fire:1,all:1},

function rstat(u,k){const m={str:"str_pct",int:"int_pct",inst:"inst_pct",init:"init_pct"}; return 1+((u.research[m[k]]||0)/100);}
function stat(u,k){const base={str:u.bStr,int:u.bInt,inst:u.bInst,init:u.bInit}[k]; return (base+u.statflat[k])*u.statmul[k]*(1+u.match)*rstat(u,k);}
function atkStat(u,dtype){const key=dtype==="Tactical"?"int":"str"; const bt={Physical:"phys",Fire:"fire",Tactical:"tac"}[dtype]; let m=u.buff[bt]; if(u.name==="Tashix")m*=(1+u.tashixStacks*0.025); return stat(u,key)*m;}
function breedMult(att,tgt){let m=1; if(tgt.breed==="Warrior")m*=CFG.warriorTaken; if(BEATS[att.breed]===tgt.breed)m*=CFG.pairwiseFav; else if(BEATS[tgt.breed]===att.breed)m/=CFG.pairwiseFav; return m;}
function computeDmg(att,tgt,dtype,rate,isBasic,rand){
  const bt={Physical:"phys",Fire:"fire",Tactical:"tac"}[dtype];
  const st=atkStat(att,dtype); const mult=isBasic?1:rate/100;
  let b=CFG.K*att.troops*Math.pow(Math.max(st,1),CFG.statExp)*mult*breedMult(att,tgt);
  b*=Math.pow(CFG.instPivot/Math.max(stat(tgt,"inst"),40),CFG.instExp);
  b*=tgt.drAll*tgt.drT[bt]*tgt.amp[bt]*tgt.amp.all;
  b*=(1+((att.research.archers_dmg||0)/100));
  b*=rand(1-CFG.rngBand,1+CFG.rngBand);
  return Math.max(1,Math.round(b));
}
function hmag(h,star){ if(h.l1==null)return 0; let Lv= star<h.slot?0:Math.max(1,Math.min(5,1+Math.floor((star-h.slot)/2))); if(Lv===0)return 0; return h.l1*HSCALE[h.tier][Lv-1]; }

function applyBuffs(team, enemy){
  const units={}; team.forEach(u=>units[u.lane]=u);
  for(const u of team){
    const d=u.raw;
    const bv=(d.buffVanguard||"").toLowerCase();
    if(bv.includes("damage received -8"))u.drAll*=0.92;
    if(bv.includes("physical damage +16"))u.buff.phys*=1.16;
    if(bv.includes("tactical damage +16"))u.buff.tac*=1.16;
    if(bv.includes("fire damage +16"))u.buff.fire*=1.16;
    [["strength","str"],["intelligence","int"],["instinct","inst"],["initiative","init"]].forEach(([s,k])=>{
      const m=bv.match(new RegExp(s.slice(0,8)+"\\w*\\s*\\+(\\d+)")); if(m)u.statflat[k]+=parseInt(m[1]);
    });
    const fp=d.flankPos, bf=(d.buffFlank||"").toLowerCase();
    const tgt=units[fp==="left"?"Left":"Right"];
    if(tgt&&tgt!==u){
      if(bf.includes("tactical damage +16"))tgt.buff.tac*=1.16;
      if(bf.includes("physical damage +10"))tgt.buff.phys*=1.10;
      if(bf.includes("fire damage +16"))tgt.buff.fire*=1.16;
      if(bf.includes("damage received -8"))tgt.drAll*=0.92;
      const fm=bf.match(/instinct \+(\d+)/); if(fm)tgt.statflat.inst+=parseInt(fm[1]);
      const im=bf.match(/initiative \+(\d+)/); if(im)tgt.statflat.init+=parseInt(im[1]);
      const sm=bf.match(/strength \+(\d+)/); if(sm)tgt.statflat.str+=parseInt(sm[1]);
    }
    if(u.breed==="Warrior"){u.drAll*=0.92;u.drT.phys*=0.88;u.drT.tac*=0.88;}
  }
  // passive habits (validated kinds; recovery stays neutral)
  for(const u of team){
    for(const h of u.habits){
      const k=h.kind;
      if(["recovery","minor","special","survival","enabler","hit","bulwark"].includes(k))continue;
      const m=hmag(h,u.star); if(m===0)continue;
      if(k==="dr_type"){const tg=h.self?u:units[h.pos==="left"?"Left":"Right"]; if(tg)h.types.forEach(t=>tg.drT[t]*=(1-m/100));}
      else if(k==="dr_all")u.drAll*=(1-m/100);
      else if(k==="buff_dmg"){const bt={phys:"phys",fire:"fire",tac:"tac"}[h.dtype]; const tg=h.self?u:units[h.pos==="left"?"Left":"Right"]; if(tg)tg.buff[bt]*=(1+m/100);}
      else if(k==="buff_stat"){const tgs=h.self?[u]:team; tgs.forEach(t=>h.stats.forEach(s=>{if(h.flat)t.statflat[s]+=m; else t.statmul[s]*=(1+m/100);}));}
      else if(k==="debuff_stat"){const n=(h.target||"enemy1").startsWith("enemy")?parseInt(h.target.slice(-1)):1; enemy.slice(0,n).forEach(e=>h.stats.forEach(s=>{if(h.flat)e.statflat[s]-=m; else e.statmul[s]*=(1-m/100);}));}
      else if(k==="amplify"){let bt=h.dtype||"all"; bt=({phys:"phys",fire:"fire",tac:"tac"})[bt]||"all"; if(enemy[0])enemy[0].amp[bt]*=(1+m/100);}
      else if(k==="debuff_dmg"){const n=(h.target||"enemy1").startsWith("enemy")?parseInt(h.target.slice(-1)):1; enemy.slice(0,n).forEach(e=>{for(const b in e.buff)e.buff[b]*=(1-m/100);});}
    }
  }
}

function fires(rounds, r){
  if(typeof rounds==="number")return rounds===r;
  if(Array.isArray(rounds))return rounds.includes(r);
  if(rounds==="odd")return r%2===1;
  if(rounds==="even")return r%2===0;
  if(rounds==="each"||rounds==="basic")return true;
  return false;
}

function simulate(teamA, teamB, seed, resA, resB){
  const rng=mulberry32(seed); const rand=(lo,hi)=>lo+(hi-lo)*rng();
  const lanes=[L,V,R];

    });
    const order=alive(A).concat(alive(B)).map(u=>({u,j:rng()})).sort((x,y)=>(stat(y.u,"init")-stat(x.u,"init"))||(x.j-y.j)).map(o=>o.u);
    for(const u of order){
      if(!u.alive||u.troops<=0)continue;

      const foes=u.side==="A"?alive(B):alive(A); const allies=u.side==="A"?alive(A):alive(B);
      if(!foes.length)break;
      const tt=taunter(foes);
      let tgt=tt||foes.find(f=>f.lane===u.lane)||foes.slice().sort((a,b)=>b.troops-a.troops)[0];
      const d=computeDmg(u,tgt,u.dmgType,100,true,rand); tgt.troops-=d; u.kills+=Math.min(d,tgt.troops+d);
      lines.push({a:u.name,al:u.lane,t:tgt.name,tl:tgt.lane,dmg:d,type:u.dmgType,rem:Math.max(0,tgt.troops),basic:true});
      if(tgt.troops<=0){tgt.troops=0;tgt.alive=false;lines.push({killed:tgt.name});}
      for(const e of u.cmd){
        if(!fires(e.rounds,r))continue;
        if(rng()>(e.chance!=null?e.chance:1))continue;
        const k=e.kind;
        if(k==="dmg"){
          const dt={phys:"Physical",tac:"Tactical",fire:"Fire"}[e.dtype];
          let cand=foes.filter(f=>f.alive&&f.troops>0); cand=cand.filter(f=>f.tauntTimer<=0).length?cand.filter(f=>f.tauntTimer<=0):cand;
          const picks=e.targets?cand.slice().sort((a,b)=>a.troops-b.troops).slice(0,e.targets):[];
          for(const p of picks){ const d2=computeDmg(u,p,dt,e.rate,false,rand); p.troops-=d2; u.kills+=Math.min(d2,p.troops+d2);
            lines.push({a:u.name,al:u.lane,t:p.name,tl:p.lane,dmg:d2,type:dt,rem:Math.max(0,p.troops),cmd:true});

          }
        } else if(k==="control"){
          const cand=foes.filter(f=>f.alive).slice(0,e.targets); const st=e.status;
          for(const p of cand){ if(st==="stun")p.stun=2; else if(st==="burn")p.burnTimer=2; else if(st==="vulnerable")p.amp.all*=1.10; else if(st==="weakened"){for(const b in p.buff)p.buff[b]*=0.9;} }
          if(st==="taunt")u.tauntTimer=2;
        } else if(k==="debuff_taken"){ foes.filter(f=>f.alive).slice(0,e.targets).forEach(p=>p.drT[e.dtype]*=(1+e.rate/100)); }
        else if(k==="heal"){ const cand=allies.filter(a=>a.alive).sort((a,b)=>a.troops-b.troops).slice(0,e.targets); cand.forEach(p=>p.troops=Math.min(p.max,p.troops+CFG.heal)); }
        else if(k==="special"&&e.status==="doublestrike")u.doublestrike=true;
        else if(k==="buff_dmg"&&u.name==="Tashix")u.tashixStacks=Math.min(10,u.tashixStacks+1);
      }
    }
    rounds.push({r,lines,Atroops:A.reduce((s,u)=>s+Math.max(0,u.troops),0),Btroops:B.reduce((s,u)=>s+Math.max(0,u.troops),0)});
    if(!alive(A).length)return {winner:"B",rounds,A,B};
    if(!alive(B).length)return {winner:"A",rounds,A,B};
  }
  const at=A.reduce((s,u)=>s+u.troops,0),bt=B.reduce((s,u)=>s+u.troops,0);
  return {winner:at>bt?"A":bt>at?"B":(rng()<0.5?"A":"B"),rounds,A,B,timeout:true};
}

// ============ SPENDING & ADVICE LOGIC (validated principles) ============
const RARITY_RANK={Legendary:3,Epic:2,Rare:1};
function starMultByRarity(rarity,star){const sb=(SCALING.starBonus[rarity]||SCALING.starBonus.Rare)[star]||0;return 1+sb;}

// quick winrate over N sims, equal footing, both sides given as [{dragon,star,growth,troops,match}]
function quickWR(A,B,N){let w=0;for(let i=0;i<N;i++){if(simulate(A,B,i*7+1,{},{}).winner==="A")w++;}return w/N;}
function slotOf(name,star){return {dragon:DRAGON_BY[name],star:star||6,growth:41,troops:5000,match:true};}

// Benchmark enemies: two representative meta cores at a fixed, moderately-hard 8★.
// We DON'T hide small upgrades behind a threshold — we show real deltas and are honest when they're small.
const BENCH_STAR=8;
function benchGauntlet(){
  return [
    [slotOf("Vhagar",BENCH_STAR),slotOf("Daemoros",BENCH_STAR),slotOf("Vaeldra",BENCH_STAR)],
    [slotOf("Vhagar",BENCH_STAR),slotOf("Venator",BENCH_STAR),slotOf("Caraxes",BENCH_STAR)],
  ];
}
function avgVsBench(team,N){const g=benchGauntlet();let s=0;for(const G of g)s+=quickWR(team,G,N);return s/g.length;}

// choose best lineup + arrangement from owned roster (engine-driven, star-aware)
// owned = {name: star}. Returns {left,vanguard,right, winVsBench} or null.
// Two-stage to stay fast: (1) cheap screen many combos with few sims, (2) re-rank top few with many sims.
function bestBuild(owned){
  const names=Object.keys(owned).filter(n=>owned[n]>0);
  if(names.length<3) return null;
  // Vanguard shortlist: front-line keystones go first (Warrior breed = tank, or has damage-reduction aura).
  // This reflects the validated finding that tanky Warriors (Vhagar/Vaeldra) make the best vanguard.
  const vanScore=(n)=>{const d=DRAGON_BY[n];let s=0;
    if(d.breed==="Warrior")s+=3;
    if((d.buffVanguard||"").toLowerCase().includes("damage received"))s+=2;
    const cmd=(COMMANDS[n]||[]); if(cmd.some(e=>e.kind==="control"&&e.status==="taunt"))s+=2; // taunt-tank = ideal vanguard
    s+=RARITY_RANK[d.rarity]*0.5; s+=(owned[n]||0)*0.1; return s;};
  const vanCands=names.slice().sort((a,b)=>vanScore(b)-vanScore(a)).slice(0,Math.min(4,names.length));
  // Stage 1: screen with few sims
  const screen=[];
  for(const vg of vanCands){
    const rest=names.filter(n=>n!==vg);
    for(let i=0;i<rest.length;i++)for(let j=i+1;j<rest.length;j++){
      const a=rest[i],b=rest[j];
      for(const [lf,rf] of [[a,b],[b,a]]){
        const team=[slotOf(lf,owned[lf]),slotOf(vg,owned[vg]),slotOf(rf,owned[rf])];
        screen.push({left:lf,vanguard:vg,right:rf,wr:avgVsBench(team,18)});
      }
    }
  }
  screen.sort((a,b)=>b.wr-a.wr);
  // Stage 2: re-rank the top 6 with many sims for a stable winner
  const top=screen.slice(0,6);
  for(const t of top){
    const team=[slotOf(t.left,owned[t.left]),slotOf(t.vanguard,owned[t.vanguard]),slotOf(t.right,owned[t.right])];
    t.wr=avgVsBench(team,150);
  }
  top.sort((a,b)=>b.wr-a.wr);
  // de-duplicate by dragon SET (same three dragons in different arrangement = keep only best arrangement)
  const seen={}; const distinct=[];
  for(const t of top){
    const key=[t.left,t.vanguard,t.right].slice().sort().join("|");
    if(seen[key])continue; seen[key]=1; distinct.push(t);
  }
  return {best:distinct[0], ranked:distinct.slice(0,3)};
}

// SPENDING ADVICE: test single-dragon and PAIR upgrades vs strong bench, rank by delta-per-cost.
// upgradeCost ~ rarity * star-step (Legendary pricier). Favors cheap Epic/Rare breakpoints.
function nextStarBreakpoint(star){ // 2/4/6/8/10 milestones; advance to next even breakpoint
  if(star<2)return 2; if(star<4)return 4; if(star<6)return 6; if(star<8)return 8; if(star<10)return 10; return null;
}
function upgradeCost(rarity,fromStar,toStar){
  const base={Legendary:3,Epic:1.6,Rare:1}[rarity]||1;     // legendaries cost much more
  const stepWeight=(toStar*toStar-fromStar*fromStar)/8;     // star cost ramps quadratically
  return base*Math.max(1,stepWeight);
}
function spendingAdvice(owned, build){
  if(!build) return null;
  const b=build.best||build;
  const team0=[slotOf(b.left,owned[b.left]),slotOf(b.vanguard,owned[b.vanguard]),slotOf(b.right,owned[b.right])];
  const N=160;
  const base=avgVsBench(team0,N);
  const members=[b.left,b.vanguard,b.right];
  const mk=(over)=>members.map(n=>slotOf(n, over[n]!=null?over[n]:owned[n]));
  const results=[];
  // singles
  for(const n of members){
    const to=nextStarBreakpoint(owned[n]); if(to==null)continue;
    const wr=avgVsBench(mk({[n]:to}),N);
    const d=DRAGON_BY[n];
    results.push({kind:"single",who:[n],from:{[n]:owned[n]},to:{[n]:to},delta:wr-base,
      cost:upgradeCost(d.rarity,owned[n],to)});
  }
  // pairs (captures threshold/synergy upgrades like the double-Warrior front)
  for(let i=0;i<members.length;i++)for(let j=i+1;j<members.length;j++){
    const n1=members[i],n2=members[j];
    const t1=nextStarBreakpoint(owned[n1]),t2=nextStarBreakpoint(owned[n2]);
    if(t1==null||t2==null)continue;
    const wr=avgVsBench(mk({[n1]:t1,[n2]:t2}),N);
    const d1=DRAGON_BY[n1],d2=DRAGON_BY[n2];
    results.push({kind:"pair",who:[n1,n2],from:{[n1]:owned[n1],[n2]:owned[n2]},to:{[n1]:t1,[n2]:t2},delta:wr-base,
      cost:upgradeCost(d1.rarity,owned[n1],t1)+upgradeCost(d2.rarity,owned[n2],t2)});
  }
  // value = delta per cost; only surface positive-delta moves
  results.forEach(r=>r.value=r.delta/Math.max(0.5,r.cost));
  results.sort((a,b)=>b.value-a.value);
  return {base, results};
}

// Headline = win% over many silent sims; plus ONE detailed sim for an illustrative log.
function slotFromOwned(name,star){return {dragon:DRAGON_BY[name],star:star||4,growth:41,troops:5000,match:true};}

// preselected high-performing enemy formations (from our meta analysis)
const HIGH_PERF=[
  {name:"Vhagar Core",team:["Vaeldra","Vhagar","Daemoros"],star:8},
  {name:"Physical Wall",team:["Venator","Vhagar","Crimson"],star:8},
  {name:"Double Tank",team:["Daemoros","Vhagar","Vaeldra"],star:8},
];
function highPerfTeam(i){const h=HIGH_PERF[i%HIGH_PERF.length];return {label:h.name,slots:h.team.map(n=>slotFromOwned(n,h.star)),lanes:h.team.slice()};}
function mirrorTeam(side){return {label:"Mirror",slots:side.slots.map(s=>({...s}))};}

// run N silent battles, return win% for the "your" side (A)
function battleWinRate(A,B,N){let w=0;for(let i=0;i<N;i++){if(simulate(A,B,i*13+5,{},{}).winner==="A")w++;}return Math.round(100*w/N);}
// one detailed battle for the illustrative log (fixed seed so it's reproducible within a view)
function battleDetail(A,B,seed){return simulate(A,B,seed||777,{},{});}

// format a fight log into compact rows for display
function formatLog(res){
  const out=[];
  res.rounds.forEach(rd=>{
    const ev=[];
    rd.lines.forEach(l=>{
      if(l.killed){ev.push({t:"kill",txt:`☠ ${l.killed} defeated`});}
      else if(l.dmg!=null){ev.push({t:l.cmd?"cmd":"hit",txt:`${l.a} → ${l.t}: ${l.dmg.toLocaleString()} ${l.type}${l.cmd?" ⚡":""}`});}
    });
    out.push({round:rd.r,a:rd.Atroops,b:rd.Btroops,events:ev});
  });
  return out;
}

// validated, non-stale explanatory notes
function buildNotes(B){
  const notes=[];
  const L=DRAGON_BY[B.left],V=DRAGON_BY[B.vanguard],R=DRAGON_BY[B.right];
  const units=[L,V,R];
  // tank front
  const warriors=units.filter(d=>d.breed==="Warrior");
  if(warriors.length>=2)notes.push({kind:"good",text:`Double tank front: ${warriors.map(w=>w.name).join(" & ")} are Warriors (the tank breed, ~16% less damage taken) — they soak hits while your damage dealer works.`});
  else if(V.breed==="Warrior")notes.push({kind:"good",text:`${V.name} anchors the Vanguard as a Warrior (tank breed), absorbing focus while flanks deal damage.`});
  // buff→lane direction (validated)
  const bf=(V.buffFlank||"").toLowerCase(), fp=V.flankPos;
  const ally=fp==="left"?L:R;
  if(bf.includes("physical")&&primaryType(ally.name)==="Physical")notes.push({kind:"good",text:`${V.name}'s ${fp}-flank buff boosts Physical damage, and ${ally.name} (${fp}) deals Physical — matched.`});
  if(bf.includes("tactical")&&primaryType(ally.name)==="Tactical")notes.push({kind:"good",text:`${V.name}'s ${fp}-flank buff boosts Tactical damage, matched by ${ally.name}.`});
  // physical core resists int-shred (validated battle6)
  if(units.every(d=>primaryType(d.name)!=="Tactical"))notes.push({kind:"info",text:`No Tactical dealers here — handy, since some enemies shred Intelligence hard. Physical/Fire damage ignores that.`});
  // affinity overlap
  const c={};units.forEach(u=>u.aff.forEach(a=>c[a]=(c[a]||0)+1));
  const sh=Object.entries(c).filter(([,n])=>n>=2).sort((a,b)=>b[1]-a[1]);
  if(sh.length)notes.push({kind:"good",text:`Shared troop affinity: ${sh.map(([a,n])=>`${a}×${n}`).join(", ")}. Run that troop type for the +20% army-match bonus.`});
  return notes;
}

      <div class="row" style="justify-content:space-between">
        <div>${lbl} ${tag}${cheap}</div>
        <div style="color:${pct>0?'var(--good)':'var(--dim)'};font-weight:700">${pct>0?'+':''}${pct}%</div>
      </div>
    </div>`));
  });
  wrap.appendChild(card);
  // standing tip (validated: troops dominate)
  wrap.appendChild(el(`<div class="note warn" style="margin:0 2px">
    <b>Always-true tip:</b> troops matter more than stars. Damage scales directly with troop count but only with the <i>square root</i> of stats — so a lower-rarity dragon with more troops often matches a high-rarity one. Invest in <b>army level & troops</b> before chasing Legendaries.</div>`));
  // share results
  const sc=el(`<div style="text-align:center;margin-top:12px"><button class="btn ghost small" id="shareR">Copy my build + plan for Discord</button></div>`);
  sc.querySelector("#shareR").onclick=()=>shareResult();
  wrap.appendChild(sc);
  const cta=el(`<div style="text-align:center;margin-top:8px"><button class="btn" id="goBattle">Test it in the simulator →</button></div>`);
  cta.querySelector("#goBattle").onclick=()=>{STATE.tab="battle";STATE.sim.result=null;render();};
  wrap.appendChild(cta);
  return wrap;
}

function shareResult(){
  const B=STATE.build.best;const adv=STATE.advice;
  let txt=`⚔ My Dragonfire formation (via Formation Council):\n`;
  txt+=`${B.left} (L) · ${B.vanguard} (V) · ${B.right} (R) — ~${Math.round(B.wr*100)}% vs strong benchmark\n`;
  const top=adv.results.filter(r=>r.delta>0.02).slice(0,2);
  if(top.length){txt+=`Next upgrades: `+top.map(r=>r.who.map(n=>`${n}→${r.to[n]}★`).join("+")+` (+${Math.round(r.delta*100)}%)`).join(", ");}
  navigator.clipboard?.writeText(txt).then(()=>alert("Copied! Paste into Discord."),()=>prompt("Copy:",txt));
}

function AboutTab(){
  return el(`<div>
   <div class="card">
     <b class="cz" style="color:var(--gold)">What this is</b>
     <p class="small" style="margin-top:6px;line-height:1.5">The Formation Council reads your roster and runs a <b>battle engine</b> — built and calibrated from real in-game battle reports — to find your strongest 3-dragon formation and tell you where your next stars are best spent. It's advice, not gospel: treat it as a strong starting point.</p>
   </div>
   <div class="card">
     <b class="cz small" style="letter-spacing:1px">WHAT'S SOLID vs APPROXIMATE</b>
     <div class="note good small">Validated against real battles: the damage formula, breed roles (Warrior = tank), self-shields, star/troop scaling, round-based command timing, and recovery.</div>
     <div class="note warn small">Still approximate: the exact value of status effects (taunt, weaken, panic) and absolute damage numbers. So <b>rankings are trustworthy; exact win % is a guide</b>.</div>
   </div>
   <div class="card">
     <b class="cz small" style="letter-spacing:1px">HELP MAKE IT BETTER</b>
     <p class="small" style="margin-top:6px;line-height:1.5">The next version simulates full battles. To sharpen it we need <b>PvP battle reports</b> — screenshots of at least the first round or two of a fight against another player's dragons. Post yours in the thread. More data = better advice for everyone.</p>
   </div>
   <div class="card small muted">
     Data sourced from community datamining + first-hand battle reports. Not affiliated with the game's developer. Found a bug or a dragon with wrong stats? Drop it in the thread.
   </div>
  </div>`);
}

function Spinner(label){
  return el(`<div class="card" style="text-align:center;padding:30px">
   <div class="cz" style="color:var(--gold);font-size:18px">⚔</div>
   <div class="small muted" style="margin-top:8px">${label}</div>
   <div class="small muted" style="margin-top:2px">(running a few hundred simulated battles)</div>
  </div>`);
}
function Footer(){
  return el(`<div class="foot">Formation Council · built for the community · advice not gospel<br>rankings reliable · exact win % approximate · help us improve with PvP reports</div>`);
}


// ============ CURRENT FORMATION TAB (optional, skippable) ============
function CurrentTab(){
  const wrap=el(`<div></div>`);
  if(ownedCount()<3){
    wrap.appendChild(el(`<div class="card"><b class="cz">Add at least 3 dragons first.</b><div class="small muted" style="margin-top:4px">Go back to <b>Roster</b> and tap the dragons you own.</div></div>`));
    return wrap;
  }
  wrap.appendChild(el(`<div class="card">
    <b class="cz" style="color:var(--gold)">Your current formation <span class="tag">optional</span></b>
    <div class="small muted" style="margin-top:4px">Tell us what you run now and the simulator can test it against the formation we suggest. Don't want to? <b>Skip it</b> — you'll still get a full recommendation.</div>
  </div>`));

  const lanes=[["L","LEFT FLANK"],["V","VANGUARD"],["R","RIGHT FLANK"]];
  const fcard=el(`<div class="card"><div class="formation" id="curForm"></div></div>`);
  const f=fcard.querySelector("#curForm");
  lanes.forEach(([key,lbl])=>{
    const nm=STATE.current[key];const d=nm?DRAGON_BY[nm]:null;
    const slot=el(`<div class="slot"><div class="slotlbl">${lbl}</div>
      <button class="slotcard" style="width:100%;border-color:${d?BREED_COLOR[d.breed]:'var(--line)'}">
        ${d?`<div class="cz" style="font-weight:600;font-size:15px">${nm}</div><div class="small muted">${d.breed} · ${STATE.owned[nm]}★</div>`:`<div class="muted small">tap to choose</div>`}
      </button></div>`);
    slot.querySelector("button").onclick=()=>openPicker(key);
    f.appendChild(slot);
  });
  wrap.appendChild(fcard);

  const row=el(`<div class="row" style="justify-content:center;gap:10px;margin-top:6px">
    <button class="btn ghost" id="skip">Skip — just recommend</button>
    <button class="btn" id="go">Get my best formation →</button>
  </div>`);
  row.querySelector("#skip").onclick=()=>{STATE.current={L:null,V:null,R:null};saveOwned();STATE.tab="build";if(!STATE.build)computeBuild(render);render();};
  row.querySelector("#go").onclick=()=>{saveOwned();STATE.tab="build";if(!STATE.build)computeBuild(render);render();};
  wrap.appendChild(row);
  return wrap;
}

let PICKER_LANE=null;
function openPicker(lane){
  PICKER_LANE=lane;
  const owned=DRAGONS.filter(d=>(STATE.owned[d.name]||0)>0);
  const overlay=el(`<div class="modal"><div class="modalbox">
    <div class="row" style="justify-content:space-between;margin-bottom:8px">
      <b class="cz">Choose a dragon</b><button class="btn ghost small" id="close">✕</button>
    </div>
    <div style="overflow:auto"><div class="grid" id="pgrid"></div></div>
    <button class="btn ghost small" id="clear" style="margin-top:8px">Clear this slot</button>
  </div></div>`);
  const g=overlay.querySelector("#pgrid");
  owned.forEach(d=>{
    const c=el(`<button class="dcard owned" style="border-color:${RARITY_COLOR[d.rarity]}">
      <div class="nm">${d.name}</div><div class="mt">${d.breed} · ${primaryType(d.name)}</div>
      <div class="st" style="color:var(--gold)">${STATE.owned[d.name]}★</div></button>`);
    c.onclick=()=>{STATE.current[PICKER_LANE]=d.name;saveOwned();document.body.removeChild(overlay);render();};
    g.appendChild(c);
  });
  overlay.querySelector("#close").onclick=()=>document.body.removeChild(overlay);
  overlay.querySelector("#clear").onclick=()=>{STATE.current[PICKER_LANE]=null;saveOwned();document.body.removeChild(overlay);render();};
  document.body.appendChild(overlay);
}

// ============ BATTLE SIMULATOR TAB ============
function currentComplete(){return STATE.current.L&&STATE.current.V&&STATE.current.R;}
function proposedSlots(){const b=STATE.build&&STATE.build.best;if(!b)return null;
  return {label:"Suggested",slots:[slotFromOwned(b.left,STATE.owned[b.left]),slotFromOwned(b.vanguard,STATE.owned[b.vanguard]),slotFromOwned(b.right,STATE.owned[b.right])],
          lanes:[b.left,b.vanguard,b.right]};}
function currentSlots(){if(!currentComplete())return null;
  return {label:"My current",slots:[slotFromOwned(STATE.current.L,STATE.owned[STATE.current.L]),slotFromOwned(STATE.current.V,STATE.owned[STATE.current.V]),slotFromOwned(STATE.current.R,STATE.owned[STATE.current.R])],
          lanes:[STATE.current.L,STATE.current.V,STATE.current.R]};}

function BattleTab(){
  const wrap=el(`<div></div>`);
  if(ownedCount()<3){wrap.appendChild(el(`<div class="card"><b class="cz">Add at least 3 dragons first.</b></div>`));return wrap;}
  if(!STATE.build){
    const c=el(`<div class="card" style="text-align:center"><b class="cz">Compute your best formation first.</b><div style="margin-top:8px"><button class="btn" id="r">Compute now</button></div></div>`);
    c.querySelector("#r").onclick=()=>{computeBuild(()=>{STATE.tab="battle";render();});render();};
    wrap.appendChild(c);return wrap;
  }
  // WIP banner — prominent on the simulator page
  wrap.appendChild(el(`<div class="note warn" style="margin:0 0 12px">
    <b>Work in progress.</b> These battles run on a model calibrated from real reports, but it's still being refined — status-effect values and exact numbers are estimates. <b>Treat win % as a guide, not a guarantee.</b> Help us improve: share PvP battle reports in the thread.</div>`));

  // YOUR SIDE
  wrap.appendChild(SidePicker("ours","YOUR SIDE","var(--rare)"));
  // ENEMY
  wrap.appendChild(SidePicker("enemy","ENEMY","var(--bad)"));

  // RUN
  const runRow=el(`<div style="text-align:center;margin:4px 0 12px"><button class="btn" id="run">⚔ Run battle (300×)</button></div>`);
  runRow.querySelector("#run").onclick=runBattle;
  wrap.appendChild(runRow);

  if(STATE.sim.running)wrap.appendChild(Spinner("Simulating 300 battles…"));
  else if(STATE.sim.result)wrap.appendChild(BattleResult());
  return wrap;
}

// unified picker for either side. role = "ours" | "enemy"
function SidePicker(role,title,color){
  const sel=STATE.sim[role]; // {mode, idx?, hand?}
  const card=el(`<div class="card"><b class="cz small" style="letter-spacing:1px;color:${color}">${title}</b><div class="row" id="opts" style="margin-top:8px;gap:6px"></div><div id="sub" style="margin-top:8px"></div><div id="lineup" style="margin-top:8px"></div></div>`);
  const opts=card.querySelector("#opts");
  // option set
  const set=[["suggested","Suggested"]];
  if(currentComplete())set.push(["current","My current"]);
  set.push(["roster","Pick from roster"]);
  if(role==="enemy"){set.push(["meta","Top meta team"]);set.push(["mirror","Mirror"]);}
  set.forEach(([k,lbl])=>{
    const b=el(`<button class="tab ${sel.mode===k?'on':''}">${lbl}</button>`);
    b.onclick=()=>{STATE.sim[role]={...sel,mode:k};STATE.sim.result=null;render();};
    opts.appendChild(b);
  });
  // sub-controls
  const sub=card.querySelector("#sub");
  if(sel.mode==="meta"){
    HIGH_PERF.forEach((h,i)=>{
      const b=el(`<button class="pill" style="margin-right:6px;cursor:pointer;${(sel.idx||0)===i?'border-color:var(--gold);color:var(--gold)':''}">${h.name}</button>`);
      b.onclick=()=>{STATE.sim[role]={...sel,idx:i};STATE.sim.result=null;render();};
      sub.appendChild(b);
    });
  } else if(sel.mode==="roster"){
    sub.appendChild(RosterPicker(role));
  } else if(sel.mode==="mirror"){
    sub.appendChild(el(`<div class="small muted">Mirrors your side exactly — a clean test of who goes in front and the arrangement.</div>`));
  }
  // resolved lineup label
  const lu=card.querySelector("#lineup");
  const resolved=resolveSide(role);
  if(resolved){
    lu.appendChild(el(`<div class="small" style="color:${color}"><b>${resolved.lanes[0]}</b> <span class="muted">(L)</span> · <b>${resolved.lanes[1]}</b> <span class="muted">(V)</span> · <b>${resolved.lanes[2]}</b> <span class="muted">(R)</span></div>`));
  } else {
    lu.appendChild(el(`<div class="small muted">— pick 3 dragons —</div>`));
  }
  return card;
}

// roster picker (3 lane slots) for either side; stores into STATE.sim[role].hand
function RosterPicker(role){
  STATE.sim[role].hand=STATE.sim[role].hand||{L:null,V:null,R:null};
  const hand=STATE.sim[role].hand;
  const box=el(`<div><div class="small muted" style="margin-bottom:6px">Build from your owned dragons:</div><div class="formation" id="hf"></div></div>`);
  const f=box.querySelector("#hf");
  [["L","LEFT"],["V","VAN"],["R","RIGHT"]].forEach(([key,lbl])=>{
    const nm=hand[key];const d=nm?DRAGON_BY[nm]:null;
    const slot=el(`<div class="slot"><div class="slotlbl">${lbl}</div>
      <button class="slotcard" style="width:100%;min-height:64px;border-color:${d?BREED_COLOR[d.breed]:'var(--line)'}">
      ${d?`<div class="cz" style="font-size:13px">${nm}</div><div class="small muted">${STATE.owned[nm]}★</div>`:`<div class="muted small">tap</div>`}</button></div>`);
    slot.querySelector("button").onclick=()=>openRosterPicker(role,key);
    f.appendChild(slot);
  });
  return box;
}
let RP_ROLE=null,RP_LANE=null;
function openRosterPicker(role,lane){
  RP_ROLE=role;RP_LANE=lane;
  const owned=DRAGONS.filter(d=>(STATE.owned[d.name]||0)>0);
  const overlay=el(`<div class="modal"><div class="modalbox">
    <div class="row" style="justify-content:space-between;margin-bottom:8px"><b class="cz">Choose a dragon</b><button class="btn ghost small" id="x">✕</button></div>
    <div style="overflow:auto"><div class="grid" id="g"></div></div></div></div>`);
  const g=overlay.querySelector("#g");
  owned.forEach(d=>{
    const c=el(`<button class="dcard owned" style="border-color:${RARITY_COLOR[d.rarity]}"><div class="nm">${d.name}</div><div class="mt">${d.breed} · ${primaryType(d.name)}</div><div class="st" style="color:var(--gold)">${STATE.owned[d.name]}★</div></button>`);
    c.onclick=()=>{STATE.sim[RP_ROLE].hand[RP_LANE]=d.name;STATE.sim.result=null;document.body.removeChild(overlay);render();};
    g.appendChild(c);
  });
  overlay.querySelector("#x").onclick=()=>document.body.removeChild(overlay);
  document.body.appendChild(overlay);
}

// resolve a side's selection into {label, slots, lanes} or null if incomplete
function resolveSide(role){
  const sel=STATE.sim[role];
  if(sel.mode==="suggested")return proposedSlots();
  if(sel.mode==="current")return currentSlots();
  if(sel.mode==="meta")return highPerfTeam(sel.idx||0);
  if(sel.mode==="mirror"){const our=resolveSide("ours");return our?{label:"Mirror",slots:our.slots.map(s=>({...s})),lanes:our.lanes.slice()}:null;}
  if(sel.mode==="roster"){const h=sel.hand||{};if(!h.L||!h.V||!h.R)return null;
    return {label:"Custom",slots:[slotFromOwned(h.L,STATE.owned[h.L]),slotFromOwned(h.V,STATE.owned[h.V]),slotFromOwned(h.R,STATE.owned[h.R])],lanes:[h.L,h.V,h.R]};}
  return null;
}

function runBattle(){
  const our=resolveSide("ours");const en=resolveSide("enemy");
  if(!our){alert("Your side isn't complete — pick 3 dragons.");return;}
  if(!en){alert("Enemy side isn't complete — pick 3 dragons.");return;}
  STATE.sim.running=true;render();
  setTimeout(()=>{
    const A=our.slots,B=en.slots;
    const wr=battleWinRate(A,B,300);
    const detail=battleDetail(A,B,777);
    STATE.sim.result={wr,our,en,winner:detail.winner};
    STATE.sim.detail=detail;
    STATE.sim.running=false;render();
  },30);
}

function BattleResult(){
  const r=STATE.sim.result;const wrap=el(`<div></div>`);
  const head=el(`<div class="card" style="text-align:center">
    <div class="small muted">${r.our.label} vs ${r.en.label}</div>
    <div class="big" style="color:${r.wr>=50?'var(--good)':'var(--bad)'};margin:4px 0">${r.wr}%</div>
    <div class="small muted">estimated win rate over 300 simulated battles</div>
    <div class="wrbar" style="margin-top:8px"><div class="wrfill" style="width:${r.wr}%"></div></div>
  </div>`);
  wrap.appendChild(head);
  // illustrative single battle log
  const log=formatLog(STATE.sim.detail);
  const det=el(`<div class="card"><div class="row" style="justify-content:space-between"><b class="cz small" style="letter-spacing:1px">ONE EXAMPLE BATTLE</b><span class="tag">illustrative only</span></div>
    <div class="small muted" style="margin:3px 0 8px">A single playthrough so you can see how it unfolds — not the verdict (that's the % above).</div>
    <div id="logbox"></div></div>`);
  const lb=det.querySelector("#logbox");
  log.slice(0,8).forEach(rd=>{
    const rdiv=el(`<div style="margin-bottom:7px"><div class="small cz" style="color:var(--gold)">Round ${rd.round} <span class="muted" style="font-weight:400">· you ${rd.a.toLocaleString()} vs enemy ${rd.b.toLocaleString()} troops</span></div></div>`);
    rd.events.slice(0,5).forEach(e=>rdiv.appendChild(el(`<div class="small ${e.t==='kill'?'':'muted'}" style="padding-left:8px${e.t==='kill'?';color:var(--bad)':''}">${e.txt}</div>`)));
    lb.appendChild(rdiv);
  });
  const winLine=el(`<div class="note ${r.winner==='A'?'good':'bad'} small" style="margin-top:6px">This example ended in a <b>${r.winner==='A'?'win':'loss'}</b> for your side. (Other runs vary — that's why the headline is the 300-battle average.)</div>`);
  det.appendChild(winLine);
  wrap.appendChild(det);
  // share
  const sc=el(`<div style="text-align:center;margin-top:10px"><button class="btn ghost small" id="sh">Copy result for Discord</button></div>`);
  sc.querySelector("#sh").onclick=()=>{
    const txt=`⚔ ${r.our.label} (${r.our.lanes.join("/")}) vs ${r.en.label}: ~${r.wr}% win (Formation Council sim, WIP)`;
    navigator.clipboard?.writeText(txt).then(()=>alert("Copied!"),()=>prompt("Copy:",txt));
  };
  wrap.appendChild(sc);
  return wrap;
}

loadOwned();
render();

</script>
</body></html>
